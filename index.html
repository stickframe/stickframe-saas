<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stick Frame — Sistema de Gestão</title>
    <meta name="description" content="Sistema de gestão completo para construtoras de Steel Frame — CRM, orçamentos, obras, financeiro e muito mais." />

    <!-- Open Graph / WhatsApp / LinkedIn -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://stickframe.com.br/" />
    <meta property="og:title"       content="Stick Frame — Sistema de Gestão" />
    <meta property="og:description" content="Gerencie obras, clientes e orçamentos de Steel Frame em um só lugar. Plataforma completa para construtoras modernas." />
    <meta property="og:image"       content="https://stickframe.com.br/logo-transparente-122x122.png" />
    <meta property="og:locale"      content="pt_BR" />
    <meta property="og:site_name"   content="Stick Frame" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Stick Frame — Sistema de Gestão" />
    <meta name="twitter:description" content="Gerencie obras, clientes e orçamentos de Steel Frame em um só lugar." />
    <meta name="twitter:image"       content="https://stickframe.com.br/logo-transparente-122x122.png" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#981915" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stickframe" />
    <link rel="apple-touch-icon" href="/logo-transparente-122x122.png" />
    <link rel="canonical" href="https://stickframe.com.br/" />

    <!-- schema.org (StickFrame Conversion Layer™ · SEO C.8) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "StickFrame",
          "url": "https://stickframe.com.br/",
          "logo": "https://stickframe.com.br/logo-transparente-122x122.png",
          "description": "Plataforma de gestão para construtoras de Steel Frame: orçamento técnico, obras, CRM e portal do cliente.",
          "sameAs": ["https://www.instagram.com/stickframe"]
        },
        {
          "@type": "SoftwareApplication",
          "name": "StickFrame — Sistema de Gestão Steel Frame",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://stickframe.com.br/",
          "description": "Controle custo, prazo e cliente em um único fluxo. Orçamento técnico (StickQuote), obras, BIM, financeiro e portal do cliente.",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "BRL", "description": "14 dias grátis, sem cartão de crédito" }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
